<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카드 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
        <div class="box" onclick="modeChange('blackjack')">BLACKJACK</div>
    </div>
    <div id="blackjack" class="game">
        <div id="dealer" class="box"></div> <br>
        <div id="textbox" class="box">카드를 뽑아 시작하세요</div> <br>
        <div id="player" class="box"></div> <br>
        <div id="bj_draw" class="box" onclick="draw(player)">hit</div>
        <div id="bj_stop" class="box" onclick="draw(dealer)">stay</div>
        <div class="box" onclick="reset()">new game</div>
        <br>
        <div class="box" onclick="modeChange('main')">초기 화면으로</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
